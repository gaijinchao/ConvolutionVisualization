<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图像卷积可视化工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>图像卷积可视化工具</h1>
          <a
            class="github-link"
            href="https://github.com/gaijinchao/ConvolutionVisualization"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub 项目：https://github.com/gaijinchao/ConvolutionVisualization
          </a>
        </div>
      </header>

      <section class="toolbar card">
        <label class="upload-btn" for="imageInput">上传图片 (JPG / PNG)</label>
        <input id="imageInput" type="file" accept="image/png,image/jpeg" />
        <button id="downloadBtn">下载结果图</button>
        <button id="resetBtn" class="secondary">重置</button>
      </section>

      <section class="config card">
        <h2>卷积配置</h2>
        <div class="config-grid">
          <label>
            卷积核尺寸
            <select id="kernelSizeSelect">
              <option value="3">3x3</option>
              <option value="5">5x5</option>
            </select>
          </label>
          <label>
            stride
            <input id="strideInput" type="number" min="1" max="8" step="1" value="1" />
          </label>
          <label>
            padding
            <input id="paddingInput" type="number" min="0" max="8" step="1" value="1" />
          </label>
        </div>
      </section>

      <section class="canvas-area card">
        <div class="panel">
          <h2>原图</h2>
          <canvas id="sourceCanvas" width="360" height="240"></canvas>
        </div>
        <div class="panel">
          <h2>卷积结果</h2>
          <canvas id="resultCanvas" width="360" height="240"></canvas>
        </div>
      </section>

      <section class="analysis-row">
        <section class="kernel-section card">
          <h2>卷积核（3x3）</h2>
          <div id="kernelGrid" class="kernel-grid"></div>
        </section>

        <section class="hover-info card">
          <h2>卷积过程（hover）</h2>
          <p id="hoverTip">将鼠标移动到结果图上，查看该点的局部卷积计算信息。</p>
        </section>
      </section>

      <section class="presets card">
        <h2>预设卷积核</h2>
        <div class="preset-buttons">
          <button data-preset="identity">单位卷积核</button>
          <button data-preset="sobel">边缘检测 Sobel</button>
          <button data-preset="blur">模糊 Blur</button>
          <button data-preset="sharpen">锐化 Sharpen</button>
          <button data-preset="laplacian">Laplacian</button>
          <button data-preset="gaussian">高斯模糊 Gaussian</button>
          <button data-preset="edgeEnhance">边缘增强</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
